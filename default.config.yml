---
# =============================================================================
# Required: your GitHub username for dotfiles (chezmoi init <github_username>)
# Set this in config.yml (git-ignored) or export GITHUB_USERNAME in your shell.
# =============================================================================
github_username: "{{ lookup('env', 'GITHUB_USERNAME') }}"

# =============================================================================
# Features — disable any you don't need
# =============================================================================
configure_dotfiles: true
configure_macos: true
configure_linux: true
configure_mas: false  # requires prior App Store sign-in
configure_dock: true

# =============================================================================
# macOS — Homebrew formulae
# Managed by the geerlingguy.homebrew role.
# =============================================================================
homebrew_installed_packages:
  - chezmoi
  - gh
  - git
  - jq
  - ncdu
  - node
  - oh-my-posh
  - pstree
  - python
  - tree
  - wget
  - yq
  - zsh

homebrew_cask_apps:
  - 1password
  - docker
  - firefox
  - font-fira-code-nerd-font
  - iterm2
  - obsidian
  - visual-studio-code

homebrew_taps:
  - homebrew/cask-fonts

homebrew_upgrade_all_packages: false
homebrew_use_brewfile: false
homebrew_clear_cache: true
homebrew_check_for_updates: false
homebrew_update_homebrew: false
homebrew_install_path: "{{ '/opt/homebrew' if ansible_machine == 'arm64' else '/usr/local' }}"
homebrew_folders_additional: []
homebrew_folders_base: []

# =============================================================================
# macOS — App Store
# configure_mas must be true and you must be signed in to the App Store.
# =============================================================================
mas_installed_apps:
  - {id: 1451685025, name: "WireGuard"}

mas_upgrade_all_apps: false
mas_signin_dialog: false

# =============================================================================
# macOS — Dock
# configure_dock must be true to enable.
# =============================================================================
dockutil_install: true

dockitems_remove:
  - Launchpad
  - TV
  - Podcasts
  - 'App Store'
  - Maps
  - Photos
  - FaceTime
  - Calendar
  - Contacts
  - Reminders
  - Notes
  - Music
  - News
  - Stocks
  - Home
  - Shortcuts

dockitems_persist:
  - name: "Finder"
    path: "/System/Applications/Finder.app/"
    pos: 1
  - name: "iTerm"
    path: "/Applications/iTerm.app/"
    pos: 2
  - name: "Visual Studio Code"
    path: "/Applications/Visual Studio Code.app/"
    pos: 3
  - name: "Firefox"
    path: "/Applications/Firefox.app/"
    pos: 4
  - name: "Obsidian"
    path: "/Applications/Obsidian.app/"
    pos: 5

# =============================================================================
# Fedora — DNF packages (standard Fedora only; not used on Silverblue)
# =============================================================================
fedora_packages:
  - 1password
  - 1password-cli
  - btop
  - code
  - direnv
  - flatpak
  - fuse-libs
  - gh
  - git
  - gnome-tweaks
  - jq
  - ncdu
  - oh-my-posh
  - powershell
  - ptyxis
  - zed
  - tree
  - vim
  - wget
  - yq
  - zsh

# =============================================================================
# Silverblue — host layer (rpm-ostree)
# Keep this list as short as possible: only what must live outside a container.
# =============================================================================
silverblue_host_packages:
  - zsh           # login shell must be on host
  - fuse-libs     # required for Flatpak portal / AppImage via Gearlever
  - gnome-tweaks  # no Flatpak available
  - microsoft-edge-stable

# =============================================================================
# Silverblue — toolbox packages (installed inside the default Fedora toolbox)
# All CLI dev tools go here; home dir is shared so dotfiles work automatically.
# Note: powershell needs the Microsoft repo enabled inside the toolbox first;
# add it manually with: toolbox run sudo dnf install -y powershell
# =============================================================================
silverblue_toolbox_packages:
  - btop
  - direnv
  - gh
  - git
  - jq
  - ncdu
  - tree
  - vim
  - wget
  - yq
  - zsh

# =============================================================================
# Fedora — Flatpak applications
# =============================================================================
fedora_flatpak_apps:
  - com.discordapp.Discord
  - com.github.johnfactotum.Foliate
  - eu.betterbird.Betterbird
  - it.mijorus.gearlever
  - md.obsidian.Obsidian
  - org.kde.krita
  - org.qbittorrent.qBittorrent

# =============================================================================
# Silverblue — extra Flatpaks (apps that replace dnf packages on Silverblue)
# =============================================================================
silverblue_extra_flatpak_apps:
  - com.onepassword.OnePassword
  - com.visualstudio.code
  - dev.zed.Zed

# =============================================================================
# oh-my-posh themes
# =============================================================================
omp_themes:
  - url: https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/kali.omp.json
    dest: kali.omp.json
  - url: https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/microverse-power.omp.json
    dest: microverse-power.omp.json
