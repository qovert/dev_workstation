---
- name: List existing toolboxes
  ansible.builtin.command: toolbox list --containers
  register: toolbox_list
  changed_when: false
  become: false

- name: Create default Fedora toolbox
  ansible.builtin.command: toolbox create --assumeyes
  when: "'fedora-toolbox' not in toolbox_list.stdout"
  changed_when: true
  become: false

- name: Install packages in toolbox
  ansible.builtin.command: >-
    toolbox run sudo dnf install -y {{ silverblue_toolbox_packages | join(' ') }}
  register: toolbox_dnf
  changed_when: "'Nothing to do' not in toolbox_dnf.stdout"
  become: false
  when: silverblue_toolbox_packages | length > 0
