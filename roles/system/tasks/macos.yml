---
- name: Disable ApplePressAndHold in VS Code (enables key repeat for vim)
  community.general.osx_defaults:
    domain: com.microsoft.VSCode
    key: ApplePressAndHoldEnabled
    type: bool
    value: false
    state: present
  become: false

- name: Set Dock to auto-hide
  community.general.osx_defaults:
    domain: com.apple.dock
    key: autohide
    type: bool
    value: true
    state: present
  become: false
  notify: Restart Dock

- name: Set Dock icon size
  community.general.osx_defaults:
    domain: com.apple.dock
    key: tilesize
    type: int
    value: 48
    state: present
  become: false
  notify: Restart Dock

- name: Configure Dock items
  ansible.builtin.include_role:
    name: geerlingguy.mac.dock
  when: configure_dock | default(false)
