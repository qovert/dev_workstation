---
- name: Development Workstation Setup
  hosts: all
  gather_facts: true
  become: true

  vars_files:
    - default.config.yml

  vars:
    ansible_python_interpreter: auto_silent

  pre_tasks:
    - name: Load local config overrides
      ansible.builtin.include_vars: "{{ item }}"
      with_first_found:
        - files:
            - config.yml
          skip: true
      tags: always

    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - github_username is defined
          - github_username | length > 0
        fail_msg: >-
          github_username must be set in default.config.yml or passed via
          -e github_username=<your-github-username>
      when: configure_dotfiles | default(false)
      tags: always

    - name: Detect ostree (Silverblue)
      ansible.builtin.stat:
        path: /run/ostree-booted
      register: ostree_booted_stat
      tags: always

    - name: Set OS facts
      ansible.builtin.set_fact:
        is_macos: "{{ ansible_system == 'Darwin' }}"
        is_fedora: "{{ ansible_distribution == 'Fedora' }}"
        is_debian: "{{ ansible_os_family == 'Debian' }}"
        is_linux: "{{ ansible_system == 'Linux' }}"
        is_silverblue: "{{ ansible_distribution == 'Fedora' and ostree_booted_stat.stat.exists }}"
        user_home: "{{ lookup('env', 'HOME') }}"
      tags: always

    - name: Bootstrap DNF Python bindings (Fedora 41+)
      ansible.builtin.raw: dnf install -y python3-libdnf5 python3-dnf
      when:
        - ansible_distribution == 'Fedora'
        - ansible_distribution_major_version | int >= 41
        - not is_silverblue
      changed_when: false
      tags: always

  roles:
    - role: packages
      tags: packages

    - role: apps
      tags: apps

    - role: toolbox
      tags: toolbox

    - role: dotfiles
      when: configure_dotfiles | default(false)
      tags: dotfiles

    - role: system
      tags: system

  tasks:
    - name: Install Xcode Command Line Tools
      ansible.builtin.include_role:
        name: elliotweiser.osx-command-line-tools
      when:
        - is_macos
        - configure_macos | default(false)
      tags: macos

    - name: Install Homebrew
      ansible.builtin.include_role:
        name: geerlingguy.homebrew
        apply:
          become: false
      when:
        - is_macos
        - configure_macos | default(false)
      tags:
        - macos
        - packages

    - name: Install Mac App Store CLI
      ansible.builtin.include_role:
        name: geerlingguy.mas
        apply:
          become: false
      when:
        - is_macos
        - configure_macos | default(false)
        - configure_mas | default(false)
      tags:
        - macos
        - apps
