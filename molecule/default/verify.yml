---
- name: Verify
  hosts: all
  gather_facts: true

  tasks:
    - name: Check git is installed
      ansible.builtin.command: git --version
      register: git_version
      changed_when: false
      failed_when: git_version.rc != 0

    - name: Check zsh is installed
      ansible.builtin.command: zsh --version
      register: zsh_version
      changed_when: false
      failed_when: zsh_version.rc != 0

    - name: Verify Flathub remote is configured
      ansible.builtin.command: flatpak remotes
      register: flatpak_remotes
      changed_when: false
      when: ansible_distribution == 'Fedora'

    - name: Assert Flathub remote exists
      ansible.builtin.assert:
        that: "'flathub' in flatpak_remotes.stdout"
        fail_msg: "Flathub remote not found"
      when: ansible_distribution == 'Fedora'
