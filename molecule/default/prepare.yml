---
- name: Prepare test environment
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Update package cache (Debian/Ubuntu)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == 'Debian'

    - name: Install testing prerequisites
      ansible.builtin.package:
        name:
          - curl
          - git
          - python3
          - zsh
        state: present
